name = "Global Requirements Pipeline"
prompt = "Scan the current project folder for Markdown files and turn requirement-like inputs into product docs.\n\nRules:\n1. Only inspect Markdown files that are not `PRD.md`, `BRIEF.md`, or `DESIGN.md`.\n2. If a Markdown file is clearly not about product requirements, skip it and report why.\n3. If a Markdown file looks like requirements, discovery notes, a transcript, or a rough product brief, use the bundled `PRD+BRIEF` skill in this repo to convert it into:\n   - `PRD.md`\n   - `BRIEF.md`\n4. After `PRD.md` and `BRIEF.md` exist, use the [$design-md](/Users/Niwat.yah/.agents/skills/design-md/SKILL.md) skill to synthesize a requirements-derived `DESIGN.md` from those two files.\n5. Create a new subfolder under the project for each source file and place the generated files there immediately.\n6. Do not overwrite existing `PRD.md`, `BRIEF.md`, or `DESIGN.md` unless the user explicitly asks to refresh them.\n7. Report back in plain language:\n   - which files were skipped\n   - which files were converted\n   - where the generated files were written\n   - any ambiguities or missing info you found\n   - which `DESIGN.md` files were created from the generated PRD/BRIEF pair\n\nAfter generating PRD/BRIEF/DESIGN:\n8. Ask whether the user wants the PRD turned into a backlog in exactly one destination system.\n9. If the user says yes, ask them to choose only one of:\n   - Jira\n   - Linear\n   - Notion\n10. If the user chooses a destination, read the matching reference file in this folder and follow it:\n   - `references/backlog-jira.md`\n   - `references/backlog-linear.md`\n   - `references/backlog-notion.md`\n11. Create Epics -> Stories -> Tasks only in the chosen system.\n12. Stop after reporting completion. Do not create backlog items in more than one system in the same run.\n\nUse the source document only. Do not invent requirements, scope, or backlog items.\nRespond in Thai only.\nIf you need to use a borrowed term or technical term, keep the term and add a short Thai explanation in parentheses the first time it appears.\nWrite in a friendly, easy-to-read style."
status = "PAUSED"
